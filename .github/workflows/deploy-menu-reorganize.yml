name: Deploy Menu Reorganize

on:
  workflow_dispatch:

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  menu-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload runner, inspect, apply
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import json
          import ssl
          import urllib.parse
          import urllib.request
          from pathlib import Path

          BASE = "https://www.sourovdeb.com"
          SITE = "https://sourovdeb.com"
          KEY = "0767044896thevenet_"
          DEPLOY = f"{BASE}/deploy.php?key={KEY}"
          CTX = ssl.create_default_context()

          def post_form(data):
              body = urllib.parse.urlencode(data).encode("utf-8")
              req = urllib.request.Request(DEPLOY, data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_url(url):
              req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          local = Path("deploy/menu-reorganize-runner.php")
          upload = post_form({
              "action": "upload",
              "path": "menu-reorganize-runner.php",
              "encoded": "true",
              "content": base64.b64encode(local.read_bytes()).decode("ascii"),
          })
          assert upload.get("status") == "uploaded", upload
          q = urllib.parse.quote(KEY)
          inspect = get_url(f"{SITE}/menu-reorganize-runner.php?key={q}&action=inspect")
          print("INSPECT:", json.dumps(inspect, indent=2))
          apply = get_url(f"{SITE}/menu-reorganize-runner.php?key={q}&action=apply")
          print("APPLY:", json.dumps(apply, indent=2))
          out = {"upload": upload, "inspect": inspect, "apply": apply}
          with open("menu-results.json", "w") as f:
              json.dump(out, f, indent=2)
          PY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: menu-reorganize-results
          path: menu-results.json
