name: Deploy Menu Reorganize

on:
  workflow_dispatch:

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  menu-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload runner, inspect, apply
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import json
          import ssl
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          BASE = "https://www.sourovdeb.com"
          SITE = "https://sourovdeb.com"
          KEY = "0767044896thevenet_"
          DEPLOY = f"{BASE}/deploy.php?key={KEY}"
          CTX = ssl.create_default_context()

          def post_form(data):
              body = urllib.parse.urlencode(data).encode("utf-8")
              req = urllib.request.Request(DEPLOY, data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_url(url, retries=5, timeout=300):
              last_err = None
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
                      with urllib.request.urlopen(req, context=CTX, timeout=timeout) as resp:
                          return json.loads(resp.read().decode("utf-8"))
                  except urllib.error.HTTPError as err:
                      last_err = err
                      if err.code == 404 and attempt < retries - 1:
                          time.sleep(2)
                          continue
                      raise
              raise last_err

          local = Path("deploy/menu-reorganize-runner.php")
          upload = post_form({
              "action": "upload",
              "path": "menu-fix-runner.php",
              "encoded": "true",
              "content": base64.b64encode(local.read_bytes()).decode("ascii"),
          })
          assert upload.get("status") == "uploaded", upload
          time.sleep(1)
          q = urllib.parse.quote(KEY)
          runner = f"{SITE}/menu-fix-runner.php?key={q}"
          inspect = get_url(f"{runner}&action=inspect")
          print("INSPECT:", json.dumps(inspect, indent=2))
          try:
              apply = get_url(f"{runner}&action=apply", timeout=300)
              print("APPLY:", json.dumps(apply, indent=2))
          except Exception as exc:
              apply = {"error": str(exc)}
              print("APPLY_ERROR:", apply)
          out = {"upload": upload, "inspect": inspect, "apply": apply}
          if isinstance(apply, dict) and apply.get("error"):
              raise SystemExit(1)
          with open("menu-results.json", "w") as f:
              json.dump(out, f, indent=2)
          PY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: menu-reorganize-results
          path: menu-results.json
