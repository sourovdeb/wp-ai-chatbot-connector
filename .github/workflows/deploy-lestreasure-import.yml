name: Deploy Les Treasure Hunters Import

on:
  workflow_dispatch:

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  deploy-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload import job, scan, start, poll until complete
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import json
          import ssl
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          BASE = "https://www.sourovdeb.com"
          SITE = "https://sourovdeb.com"
          KEY = "0767044896thevenet_"
          DEPLOY = f"{BASE}/deploy.php?key={KEY}"
          CTX = ssl.create_default_context()

          def post_form(data):
              body = urllib.parse.urlencode(data).encode("utf-8")
              req = urllib.request.Request(DEPLOY, data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_url(url):
              req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          local = Path("deploy/lestreasure-import-job.php")
          upload = post_form({
              "action": "upload",
              "path": "lestreasure-import-job.php",
              "encoded": "true",
              "content": base64.b64encode(local.read_bytes()).decode("ascii"),
          })
          assert upload.get("status") == "uploaded", upload

          q = urllib.parse.quote(KEY)
          scan = get_url(f"{SITE}/lestreasure-import-job.php?key={q}&action=scan")
          print("SCAN:", json.dumps(scan, indent=2))

          start = get_url(f"{SITE}/lestreasure-import-job.php?key={q}&action=start&batch=10")
          print("START:", json.dumps(start, indent=2))

          out = {"upload": upload, "scan": scan, "start": start, "polls": []}
          for i in range(40):
              time.sleep(20)
              try:
                  status = get_url(f"{SITE}/lestreasure-import-job.php?key={q}&action=status")
              except Exception as e:
                  status = {"poll_error": str(e)}
              out["polls"].append({"t": i + 1, "data": status})
              print(f"POLL_{i+1}:", json.dumps(status, indent=2))
              job = status.get("job") or {}
              if status.get("remaining") == 0 or job.get("status") == "completed":
                  break

          out["child_pages"] = get_url(
              f"{SITE}/wp-json/wp/v2/pages?parent=39&per_page=100&_fields=id,title,slug"
          )
          with open("import-results.json", "w") as f:
              json.dump(out, f, indent=2)
          print(json.dumps(out, indent=2))
          PY

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: lestreasure-import-results
          path: import-results.json
