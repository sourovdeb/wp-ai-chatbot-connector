name: Fix Micro Posts Category
on:
  workflow_dispatch:
env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload runner and execute
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64, json, ssl, time, urllib.error, urllib.parse, urllib.request
          from pathlib import Path
          BASE, KEY = "https://www.sourovdeb.com", "0767044896thevenet_"
          CTX = ssl.create_default_context()
          def post_form(data):
              body = urllib.parse.urlencode(data).encode()
              req = urllib.request.Request(f"{BASE}/deploy.php?key={KEY}", data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              with urllib.request.urlopen(req, context=CTX, timeout=180) as r:
                  return json.loads(r.read().decode())
          def get_url(url, retries=5, timeout=120):
              last_err = None
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
                      with urllib.request.urlopen(req, context=CTX, timeout=timeout) as r:
                          return json.loads(r.read().decode())
                  except urllib.error.HTTPError as err:
                      last_err = err
                      if err.code == 404 and attempt < retries - 1:
                          time.sleep(2)
                          continue
                      raise
              raise last_err
          local = Path("deploy/fix-micro-posts-category.php")
          up = post_form({"action":"upload","path":"fix-micro-posts-category.php","encoded":"true","content":base64.b64encode(local.read_bytes()).decode()})
          assert up.get("status")=="uploaded", up
          time.sleep(1)
          runner = f"{BASE}/fix-micro-posts-category.php?key={urllib.parse.quote(KEY)}"
          result = get_url(runner)
          print(json.dumps(result, indent=2))
          PY
