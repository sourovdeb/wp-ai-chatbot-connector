name: Fix Automation Agent + Diagnostic

on:
  workflow_dispatch:

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  fix-and-diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix automation agent and run diagnostic
        run: |
          set -euo pipefail
          python3 deploy/fix-automation-agent.py | tee fix-diagnostic-results.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: fix-diagnostic-results
          path: fix-diagnostic-results.json
