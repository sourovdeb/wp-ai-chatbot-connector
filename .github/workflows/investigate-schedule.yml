name: Investigate Schedule

on:
  workflow_dispatch:

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  investigate-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch scheduled API (before runner)
        run: |
          set -euo pipefail
          curl -sS -H "X-Sourov-Key: ${DEPLOY_KEY}" \
            "https://sourovdeb.com/wp-json/sourov/v1/scheduled" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          posts = data.get('posts', data if isinstance(data, list) else [])
          sample = []
          for p in posts[:20]:
              sample.append({
                  'id': p.get('id'),
                  'title': p.get('title'),
                  'scheduled': p.get('scheduled') or p.get('post_date'),
              })
          out = {
              'count': data.get('count', len(posts)),
              'sample_first_20': sample,
          }
          print(json.dumps(out, indent=2))
          with open('scheduled-api-sample.json', 'w') as f:
              json.dump(out, f, indent=2)
          "

      - name: Upload runner and run
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import json
          import os
          import ssl
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          BASE = "https://www.sourovdeb.com"
          SITE = "https://sourovdeb.com"
          KEY = "0767044896thevenet_"
          DEPLOY = f"{BASE}/deploy.php?key={KEY}"
          CTX = ssl.create_default_context()

          def post_form(data):
              body = urllib.parse.urlencode(data).encode("utf-8")
              req = urllib.request.Request(DEPLOY, data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_url(url, retries=5, timeout=300):
              last_err = None
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
                      with urllib.request.urlopen(req, context=CTX, timeout=timeout) as resp:
                          return json.loads(resp.read().decode("utf-8"))
                  except urllib.error.HTTPError as err:
                      last_err = err
                      if err.code == 404 and attempt < retries - 1:
                          time.sleep(2)
                          continue
                      raise
              raise last_err

          local = Path("deploy/investigate-schedule.php")
          upload = post_form({
              "action": "upload",
              "path": "investigate-schedule.php",
              "encoded": "true",
              "content": base64.b64encode(local.read_bytes()).decode("ascii"),
          })
          assert upload.get("status") == "uploaded", upload
          time.sleep(1)
          q = urllib.parse.quote(KEY)
          runner = f"{SITE}/investigate-schedule.php?key={q}"
          result = get_url(runner)
          print(json.dumps(result, indent=2))
          with open("investigate-schedule-results.json", "w") as f:
              json.dump({"upload": upload, "result": result}, f, indent=2)
          PY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: investigate-schedule-results
          path: |
            investigate-schedule-results.json
            scheduled-api-sample.json