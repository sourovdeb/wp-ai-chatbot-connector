name: Deploy Journal Cleanup

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'inspect (dry-run) or apply (delete pages)'
        required: true
        default: 'inspect'
        type: choice
        options:
          - inspect
          - apply

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  journal-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload runner and run
        env:
          MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import json
          import os
          import ssl
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          BASE = "https://www.sourovdeb.com"
          SITE = "https://sourovdeb.com"
          KEY = "0767044896thevenet_"
          MODE = os.environ.get("MODE", "inspect")
          DEPLOY = f"{BASE}/deploy.php?key={KEY}"
          CTX = ssl.create_default_context()

          def post_form(data):
              body = urllib.parse.urlencode(data).encode("utf-8")
              req = urllib.request.Request(DEPLOY, data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_url(url, retries=5, timeout=300):
              last_err = None
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
                      with urllib.request.urlopen(req, context=CTX, timeout=timeout) as resp:
                          return json.loads(resp.read().decode("utf-8"))
                  except urllib.error.HTTPError as err:
                      last_err = err
                      if err.code == 404 and attempt < retries - 1:
                          time.sleep(2)
                          continue
                      raise
              raise last_err

          local = Path("deploy/journal-cleanup-runner.php")
          upload = post_form({
              "action": "upload",
              "path": "journal-cleanup-runner.php",
              "encoded": "true",
              "content": base64.b64encode(local.read_bytes()).decode("ascii"),
          })
          assert upload.get("status") == "uploaded", upload
          time.sleep(1)
          q = urllib.parse.quote(KEY)
          runner = f"{SITE}/journal-cleanup-runner.php?key={q}&action={MODE}"
          result = get_url(runner)
          print(json.dumps(result, indent=2))
          with open("journal-cleanup-results.json", "w") as f:
              json.dump({"upload": upload, "mode": MODE, "result": result}, f, indent=2)
          PY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: journal-cleanup-results
          path: journal-cleanup-results.json