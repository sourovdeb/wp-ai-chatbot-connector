name: Deploy to WordPress

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ai-chatbot-connector.php'
      - 'chatbot-v050-options-runner.php.template'
      - 'chatbot-selftest-runner.php'
      - 'crawl-page.php'
      - 'sourov-ai-chatbot/**'
      - 'activate-sourov-chatbot.php'
      - '.github/workflows/deploy-to-wordpress.yml'

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload plugin via deploy.php
        run: |
          set -euo pipefail
          CONTENT=$(base64 -w 0 ai-chatbot-connector.php)
          curl --fail -sS -X POST "${DEPLOY_BASE}/deploy.php?key=${DEPLOY_KEY}" \
            --data-urlencode "action=upload" \
            --data-urlencode "path=wp-content/plugins/wp-ai-chatbot-connector/ai-chatbot-connector.php" \
            --data-urlencode "encoded=true" \
            --data-urlencode "content=$CONTENT" \
            | tee plugin-upload.json

      - name: Verify plugin upload size
        run: |
          set -euo pipefail
          curl --fail -sS "${DEPLOY_BASE}/deploy.php?action=list&key=${DEPLOY_KEY}&path=wp-content/plugins/wp-ai-chatbot-connector/" \
            | tee plugin-list.json
          SIZE=$(python3 -c "import json; d=json.load(open('plugin-list.json')); print(d['items'][0]['size'])")
          echo "Uploaded plugin size: $SIZE bytes"
          test "$SIZE" -gt 35000

      - name: Upload and run v0.5 options runner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY secret not set; skipping options runner"
            exit 0
          fi
          sed "s|__GEMINI_API_KEY__|${GEMINI_API_KEY}|" chatbot-v050-options-runner.php.template > chatbot-v050-options-runner.php
          CONTENT=$(base64 -w 0 chatbot-v050-options-runner.php)
          curl --fail -sS -X POST "${DEPLOY_BASE}/deploy.php?key=${DEPLOY_KEY}" \
            --data-urlencode "action=upload" \
            --data-urlencode "path=chatbot-v050-options-runner.php" \
            --data-urlencode "encoded=true" \
            --data-urlencode "content=$CONTENT" \
            | tee options-runner-upload.json
          curl --fail -sS "${DEPLOY_BASE}/chatbot-v050-options-runner.php?key=${DEPLOY_KEY}" | tee options-runner-output.json

      - name: Upload and run chatbot selftest
        run: |
          set -euo pipefail
          CONTENT=$(base64 -w 0 chatbot-selftest-runner.php)
          curl --fail -sS -X POST "${DEPLOY_BASE}/deploy.php?key=${DEPLOY_KEY}" \
            --data-urlencode "action=upload" \
            --data-urlencode "path=chatbot-selftest-runner.php" \
            --data-urlencode "encoded=true" \
            --data-urlencode "content=$CONTENT" \
            | tee selftest-upload.json
          curl --fail -sS "${DEPLOY_BASE}/chatbot-selftest-runner.php?key=${DEPLOY_KEY}" | tee selftest-output.json

      - name: Upload crawl-page.php
        run: |
          set -euo pipefail
          CONTENT=$(base64 -w 0 crawl-page.php)
          curl --fail -sS -X POST "${DEPLOY_BASE}/deploy.php?key=${DEPLOY_KEY}" \
            --data-urlencode "action=upload" \
            --data-urlencode "path=wp-content/plugins/crawl-page.php" \
            --data-urlencode "encoded=true" \
            --data-urlencode "content=$CONTENT" \
            | tee crawl-upload.json

      - name: Upload sourov-ai-chatbot plugin
        run: |
          set -euo pipefail
          CONTENT=$(base64 -w 0 sourov-ai-chatbot/sourov-ai-chatbot.php)
          curl --fail -sS -X POST "${DEPLOY_BASE}/deploy.php?key=${DEPLOY_KEY}" \
            --data-urlencode "action=upload" \
            --data-urlencode "path=wp-content/plugins/sourov-ai-chatbot/sourov-ai-chatbot.php" \
            --data-urlencode "encoded=true" \
            --data-urlencode "content=$CONTENT" \
            | tee chatbot-upload.json

      - name: Verify crawl-page and chatbot uploads
        run: |
          set -euo pipefail
          curl --fail -sS "${DEPLOY_BASE}/deploy.php?action=list&key=${DEPLOY_KEY}&path=wp-content/plugins/" \
            | tee plugins-list.json
          python3 -c "import json; d=json.load(open('plugins-list.json')); names={i['name'] for i in d['items']}; assert 'crawl-page.php' in names; print('crawl-page.php present')"
          curl --fail -sS "${DEPLOY_BASE}/deploy.php?action=list&key=${DEPLOY_KEY}&path=wp-content/plugins/sourov-ai-chatbot/" \
            | tee chatbot-list.json
          python3 -c "import json; d=json.load(open('chatbot-list.json')); assert d['items']; print('chatbot size:', d['items'][0]['size'])"

      - name: Upload plugin-manager-runner.php (force_sync)
        run: |
          set -euo pipefail
          CONTENT=$(base64 -w 0 plugin-manager-runner.php)
          curl --fail -sS -X POST "${DEPLOY_BASE}/deploy.php?key=${DEPLOY_KEY}" \
            --data-urlencode "action=upload" \
            --data-urlencode "path=plugin-manager-runner.php" \
            --data-urlencode "encoded=true" \
            --data-urlencode "content=$CONTENT" \
            | tee runner-upload.json

      - name: Execute runner
        run: |
          set -euo pipefail
          curl --fail -sS "${DEPLOY_BASE}/plugin-manager-runner.php?key=${DEPLOY_KEY}" | tee runner-output.json

      - name: Upload and run chatbot activator
        run: |
          set -euo pipefail
          CONTENT=$(base64 -w 0 activate-sourov-chatbot.php)
          curl --fail -sS -X POST "${DEPLOY_BASE}/deploy.php?key=${DEPLOY_KEY}" \
            --data-urlencode "action=upload" \
            --data-urlencode "path=activate-sourov-chatbot.php" \
            --data-urlencode "encoded=true" \
            --data-urlencode "content=$CONTENT" \
            | tee activator-upload.json
          curl --fail -sS "${DEPLOY_BASE}/activate-sourov-chatbot.php?key=${DEPLOY_KEY}" | tee activator-output.json

      - name: Fetch final plugin list
        run: |
          set -euo pipefail
          curl --fail -sS "${DEPLOY_BASE}/wp-json/sourov-diagnostic/v1/plugins" | tee final-plugins.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-results
          path: |
            plugin-upload.json
            options-runner-upload.json
            options-runner-output.json
            selftest-upload.json
            selftest-output.json
            crawl-upload.json
            chatbot-upload.json
            plugin-list.json
            plugins-list.json
            chatbot-list.json
            runner-upload.json
            runner-output.json
            activator-upload.json
            activator-output.json
            final-plugins.json
