name: Fix Missed Schedule

on:
  workflow_dispatch:

env:
  DEPLOY_BASE: https://www.sourovdeb.com
  DEPLOY_KEY: 0767044896thevenet_

jobs:
  fix-missed-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload runner and run
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import json
          import ssl
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          BASE = "https://www.sourovdeb.com"
          KEY = "0767044896thevenet_"
          DEPLOY = f"{BASE}/deploy.php?key={KEY}"
          CTX = ssl.create_default_context()

          def post_form(data):
              body = urllib.parse.urlencode(data).encode("utf-8")
              req = urllib.request.Request(DEPLOY, data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              with urllib.request.urlopen(req, context=CTX, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_url(url, retries=5, timeout=300):
              last_err = None
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
                      with urllib.request.urlopen(req, context=CTX, timeout=timeout) as resp:
                          return json.loads(resp.read().decode("utf-8"))
                  except urllib.error.HTTPError as err:
                      last_err = err
                      if err.code == 404 and attempt < retries - 1:
                          time.sleep(2)
                          continue
                      raise
              raise last_err

          local = Path("deploy/fix-missed-schedule.php")
          upload = post_form({
              "action": "upload",
              "path": "fix-missed-schedule.php",
              "encoded": "true",
              "content": base64.b64encode(local.read_bytes()).decode("ascii"),
          })
          assert upload.get("status") == "uploaded", upload
          time.sleep(1)
          q = urllib.parse.quote(KEY)
          runner = f"{BASE}/fix-missed-schedule.php?key={q}&limit=200"
          result = get_url(runner)
          print(json.dumps(result, indent=2))

          cron_results = []
          for i in range(3):
              cron_url = f"{BASE}/wp-cron.php?doing_wp_cron"
              req = urllib.request.Request(cron_url)
              with urllib.request.urlopen(req, context=CTX, timeout=120) as resp:
                  cron_results.append({"attempt": i + 1, "status": resp.status})
                  print(f"wp-cron attempt {i + 1}: HTTP {resp.status}")
              if i < 2:
                  time.sleep(2)

          with open("fix-missed-schedule-results.json", "w") as f:
              json.dump({"upload": upload, "result": result, "wp_cron": cron_results}, f, indent=2)
          PY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fix-missed-schedule-results
          path: fix-missed-schedule-results.json
